name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Package extension
        run: cd dist && zip -r ../yt-bookmarks-${{ github.ref_name }}.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: yt-bookmarks-${{ github.ref_name }}.zip
          generate_release_notes: true
